# Decoration and visual settings
decoration {
    rounding = 20
    rounding_power = 2

    # Transparency
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # Blur effect
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}
